name: Spec Lint & Scope Check

on:
  push:
    paths:
      - '**/spec.yaml'
      - '**/.forgemyspec-policy.yaml'
  pull_request:
    paths:
      - '**/spec.yaml'
      - '**/.forgemyspec-policy.yaml'

jobs:
  lint-and-scope:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install forgemyspec
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Get changed spec files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            specs=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.yaml' | grep 'spec\.yaml$' | tr '\n' ' ')
          else
            specs=$(git diff --name-only HEAD~1 HEAD -- '**/spec.yaml' | tr '\n' ' ')
          fi
          echo "specs=$specs" >> "$GITHUB_OUTPUT"

      - name: Lint specs and check scope drift
        if: steps.changed.outputs.specs != ''
        env:
          CHANGED_SPECS: ${{ steps.changed.outputs.specs }}
        run: |
          python - <<'EOF'
          import sys
          import os
          import pathlib
          import yaml
          from forgemyspec.linting import lint_spec, format_lint_report
          from forgemyspec.scope_eval import evaluate_scope_drift, format_scope_eval
          from forgemyspec.generator import load_spec

          specs = os.environ["CHANGED_SPECS"].split()
          specs = [p for p in specs if pathlib.Path(p).exists()]
          if not specs:
              print("No changed spec.yaml files found.")
              sys.exit(0)

          failed = False
          for path in sorted(specs):
              print(f"\n{'='*60}")
              print(f"  {path}")
              print(f"{'='*60}")

              try:
                  spec_data = load_spec(path)
              except yaml.YAMLError as e:
                  print(f"[ERROR] Invalid YAML: {e}")
                  failed = True
                  continue

              candidate_text = pathlib.Path(path).read_text(encoding="utf-8")

              lint_report = lint_spec(spec_data)
              print(format_lint_report(lint_report))
              if lint_report.has_errors:
                  failed = True

              print()
              scope_result = evaluate_scope_drift(spec_data, candidate_text)
              print(format_scope_eval(scope_result))
              if not scope_result.passed:
                  failed = True

          sys.exit(1 if failed else 0)
          EOF
